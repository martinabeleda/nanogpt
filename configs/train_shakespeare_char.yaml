# Train a miniature character-level Shakespeare model.
# Good for debugging and playing on macbooks.
#
# Usage:
#   uv run python train.py --config-name train_shakespeare_char

defaults:
  - config
  - _self_

out_dir: out-shakespeare-char
eval_interval: 250
eval_iters: 200
log_interval: 10
always_save_checkpoint: false

wandb_log: false
wandb_project: shakespeare-char
wandb_run_name: mini-gpt

dataset: shakespeare_char
data_dir: /data/shakespeare_char/2026-03-18
gradient_accumulation_steps: 1
batch_size: 64
block_size: 256

# Baby GPT model
n_layer: 6
n_head: 6
n_embd: 384
dropout: 0.2

learning_rate: 1e-3
max_iters: 5000
lr_decay_iters: 5000
min_lr: 1e-4
beta2: 0.99
warmup_iters: 100

device: cuda
compile: false
