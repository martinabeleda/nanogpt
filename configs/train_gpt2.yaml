# Train GPT-2 (124M) to ~2.85 val loss on OpenWebText.
# Designed for 1 node of 8x A100 40GB. ~5 days training.
#
# Usage:
#   torchrun --standalone --nproc_per_node=8 train.py --config-name train_gpt2

defaults:
  - config
  - _self_

wandb_log: true
wandb_project: owt
wandb_run_name: gpt2-124M

batch_size: 12
block_size: 1024
gradient_accumulation_steps: 40  # 5 * 8 GPUs

max_iters: 600000
lr_decay_iters: 600000

eval_interval: 1000
eval_iters: 200
log_interval: 10

weight_decay: 0.1
